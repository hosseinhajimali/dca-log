version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mydca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mydca
      POSTGRES_PASSWORD: mydca_secret
      POSTGRES_DB: mydca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
