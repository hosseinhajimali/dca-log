<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DCAlog | Invest consistently. Profit systematically.</title>
    <meta name="description" content="DCAlog helps you track your dollar-cost averaging strategy, monitor buying opportunities based on market conditions, and know when to take profit, all in one place." />
    <link rel="canonical" href="https://dcalog.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://dcalog.com/" />
    <meta property="og:title"       content="DCAlog | Invest consistently. Profit systematically." />
    <meta property="og:description" content="Track your DCA strategy, monitor buying opportunities, and know when to take profit. Built for long-term crypto investors." />
    <meta property="og:image"       content="https://dcalog.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="DCAlog | Invest consistently. Profit systematically." />
    <meta name="twitter:description" content="Track your DCA strategy, monitor buying opportunities, and know when to take profit. Built for long-term crypto investors." />
    <meta name="twitter:image"       content="https://dcalog.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Blocking theme script, prevents flash of wrong theme on load -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('dcalog-store') || '{}');
          var theme = (stored.state && stored.state.theme) || 'dark';
          var resolved = theme === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-gray-950 text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
